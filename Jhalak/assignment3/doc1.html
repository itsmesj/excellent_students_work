<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #d08383;
      padding: 100px;
    }
    .calculator {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border-radius: 15px;
      background: rgb(204, 179, 179);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    .calculator input {
      height: 60px;
      font-size: 24px;
    }
    .btn {
      font-size: 24px;
      width: 100%;
    }
    .row > .col-3, .row > .col-6 {
      padding: 6px;
    }
  </style>
</head>
<body>

    <div class="calculator">
       <input type="text" id="display" class="form-control mb-3 text-end" disabled/>
       <div class="row">
         <div class="col-3"><button class="btn btn-secondary" onclick="clearDisplay()">C</button></div>
         <div class="col-3"><button class="btn btn-secondary" onclick="appendValue('(')">(</button></div>
         <div class="col-3"><button class="btn btn-secondary" onclick="appendValue(')')">)</button></div>
         <div class="col-3"><button class="btn btn-danger" onclick="deleteLast()">DEL</button></div>

         <div class="col-3"><button class="btn btn-light" onclick="appendValue('7')">7</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('8')">8</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('9')">9</button></div>
         <div class="col-3"><button class="btn btn-warning" onclick="appendValue('/')">/</button></div>

          <div class="col-3"><button class="btn btn-light" onclick="appendValue('4')">4</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('5')">5</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('6')">6</button></div>
         <div class="col-3"><button class="btn btn-warning" onclick="appendValue('*')">*</button></div>

          <div class="col-3"><button class="btn btn-light" onclick="appendValue('1')">1</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('2')">2</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('3')">3</button></div>
         <div class="col-3"><button class="btn btn-warning" onclick="appendValue('-')">-</button></div>

          <div class="col-3"><button class="btn btn-light" onclick="appendValue('0')">0</button></div>
         <div class="col-3"><button class="btn btn-light" onclick="appendValue('.')">.</button></div>
         <div class="col-3"><button class="btn btn-success" onclick="calculate()">=</button></div>
         <div class="col-3"><button class="btn btn-warning" onclick="appendValue('+')">+</button></div>
       </div>
    </div>

    <script>
        function appendValue(value){
            document.getElementById('display').value += value;
        }
        function clearDisplay(){
            document.getElementById('display').value = '';
        }
        function deleteLast(){
            const display = document.getElementById('display');
            display.value = display.value.slice(0, -1);
        }
        function calculate(){
            try{
                const result = eval(document.getElementById('display').value);  //eval = evaluates the expression 
                document.getElementById('display').value = result;
            }catch{
                document.getElementById('display').value = 'Error';
            }
        }
    </script>




  
</body>
</html>
