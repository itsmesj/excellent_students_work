<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enhanced Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <h2>Image gallery</h2>
  <div class="controls">
    <input type="text" id="searchBox" placeholder="search images.">
    <button id="toggleTheme">Toggle Theme</button>
  </div>
  <div class="gallery" id="gallery">

     <img src="http://picsum.photos/id/1015/300/200" alt="Mountain" data-desc="mountains" data-full="http://picsum.photos/id/1015/800/600" >
   <img src="http://picsum.photos/id/1025/300/200" alt="Puppy" data-desc="Puppy" data-full="http://picsum.photos/id/1025/800/600" >
   <img src="http://picsum.photos/id/1035/300/200" alt="waterfall" data-desc="waterfall" data-full="http://picsum.photos/id/1035/800/600" >
   <img src="http://picsum.photos/id/1045/300/200" alt="forest" data-desc="forest" data-full="http://picsum.photos/id/1045/800/600" >
    <img src="http://picsum.photos/id/1055/300/200" alt="Beach" data-desc="Beach" data-full="http://picsum.photos/id/1055/800/600" >
     <img src="http://picsum.photos/id/1065/300/200" alt="City" data-desc="City" data-full="http://picsum.photos/id/1065/800/600" >
     <img src="http://picsum.photos/id/1075/300/200" alt="sky" data-desc="sky" data-full="http://picsum.photos/id/1075/800/600" >
     <img src="http://picsum.photos/id/1085/300/200" alt="Lake" data-desc="Lake" data-full="http://picsum.photos/id/1085/800/600" >
      <img src="http://picsum.photos/id/1095/300/200" alt="Canyon" data-desc="Canyon" data-full="http://picsum.photos/id/1095/800/600" >
       <img src="http://picsum.photos/id/1105/300/200" alt="river" data-desc="river" data-full="http://picsum.photos/id/1105/800/600" >
  </div>
  
  <!--Modals---->

  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeBtn">&times;</span>
      <img src="" alt="Full Image" id="modalImg">
      <div class="modal-caption">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <div class="modal-controls">
          <button id="prevBtn">back</button>
           <button id="nextBtn">next</button>
            <button id="slideshowBtn">slideshow</button>
            <a id="downloadBtn" download target="_blank">download</a>
        </div>
      </div>
    </div>

  </div>


  <script src="script.js"></script>
</body>
</html>
